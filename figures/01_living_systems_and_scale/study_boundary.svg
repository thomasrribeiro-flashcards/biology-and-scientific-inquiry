<title id='title'>Two candidate system boundaries around a potted plant</title>
<desc id='desc'>A potted plant sits in soil with surrounding air. A small dashed outline labeled A encloses only the plant. A larger dashed outline labeled B encloses the plant, the soil, and nearby air. Arrows link soil to plant and air to plant to show interactions.</desc>
